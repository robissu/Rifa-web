<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rifa Solidária</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .topo {
      margin-bottom: 20px;
    }

    .topo h2 {
      margin: 5px 0;
    }

    .tabela-rifas {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 5px;
      margin-top: 20px;
    }

    .numero {
      border: 1px solid red;
      padding: 10px;
      text-align: center;
      cursor: pointer;
    }

    .comprado {
      background-color: #f44336;
      color: white;
    }

    .selecionado {
      background-color: #4caf50;
      color: white;
    }

    button {
      margin-top: 20px;
      padding: 10px 15px;
      font-size: 16px;
    }

    .botoes-pagina {
      margin-top: 20px;
    }

    .botoes-pagina button {
      margin-right: 10px;
    }

    #botaoComprar {
      display: none;
      background-color: #2196f3;
      color: white;
      border: none;
      margin-top: 30px;
    }

    /* Estilo para as imagens dos prêmios */
    .premio-item {
      margin-bottom: 30px;
      /* Espaço entre um prêmio e outro */
      text-align: center;
    }

    .img-rifa {
      width: 100%;
      max-width: 400px;
      /* Tamanho máximo da foto */
      height: auto;
      border-radius: 15px;
      /* Bordas arredondadas */
      margin-top: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      /* Sombra para destaque */
    }

    /* Alinha os cards um ao lado do outro e centraliza na tela */
    .secao-premios {
      display: flex;
      flex-direction: row;
      /* Força a ficar lado a lado */
      justify-content: center;
      /* Centraliza o bloco todo */
      align-items: flex-start;
      /* Alinha por cima */
      gap: 10px;
      /* Espaço entre os cards */
      margin: 20px 0;
      flex-wrap: nowrap;
      /* Impede que elas pulem linha no computador */
    }

    /* Configuração de cada card individual */
    .premio-card {
      width: 130px;
      /* Largura bem pequena para caberem lado a lado */
      text-align: center;
      font-size: 12px;
      /* Diminui um pouco o texto para combinar */
    }

    .premio-card p {
      margin: 0;
      color: #d32f2f;
      font-weight: bold;
    }

    .premio-card span {
      display: block;
      margin-bottom: 5px;
      min-height: 30px;
      /* Mantém os nomes alinhados */
    }

    /* Ajuste final da imagem */
    .img-rifa {
      width: 100%;
      /* Ocupa os 130px do card */
      height: 100px;
      /* Altura fixa para ficarem iguais */
      object-fit: cover;
      /* Não deixa a imagem distorcer */
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    /* Ajuste para celular: se a tela for muito pequena, elas diminuem mais */
    @media (max-width: 450px) {
      .premio-card {
        width: 30%;
        /* No celular, cada uma ocupa 30% da largura */
      }

      .img-rifa {
        height: 70px;
        /* Foto menor ainda no celular */
      }
    }
  </style>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAvSQn-RYyajflSDiySsVey--pZJAtzrMw",
      authDomain: "rifa-web-c0430.firebaseapp.com",
      databaseURL: "https://rifa-web-c0430-default-rtdb.firebaseio.com",
      projectId: "rifa-web-c0430",
      storageBucket: "rifa-web-c0430.firebasestorage.app",
      messagingSenderId: "860286230035",
      appId: "1:860286230035:web:8455e3fc1a34391392e9e6",
      measurementId: "G-RLSBNRR0FW"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const container = document.getElementById('rifaContainer');
    const botaoComprar = document.getElementById('botaoComprar');
    const totalPaginas = 5;
    const numerosPorPagina = 100;
    let paginaAtual = 1;
    let estadoNumeros = Array.from({ length: totalPaginas * numerosPorPagina }, () => false);
    let selecionados = [];

    function atualizarInterface() {
      container.innerHTML = '';
      selecionados = [];
      botaoComprar.style.display = 'none';
      const inicio = (paginaAtual - 1) * numerosPorPagina + 1;
      const fim = paginaAtual * numerosPorPagina;

      for (let i = inicio; i <= fim; i++) {
        const div = document.createElement('div');
        div.textContent = i;
        div.classList.add('numero');
        const indexGlobal = i - 1;

        if (estadoNumeros[indexGlobal]) {
          div.classList.add('comprado');
        }

        div.onclick = () => {
          if (estadoNumeros[indexGlobal]) return; // não marca vendidos
          div.classList.toggle('selecionado');
          const selecionado = div.classList.contains('selecionado');

          if (selecionado) {
            selecionados.push(i);
          } else {
            selecionados = selecionados.filter(n => n !== i);
          }

          botaoComprar.style.display = selecionados.length > 0 ? 'inline-block' : 'none';
        };

        container.appendChild(div);
      }
    }

    function mostrarPagina(pagina) {
      paginaAtual = pagina;
      atualizarInterface();
    }

    const estadoRef = ref(db, 'rifas');
    onValue(estadoRef, (snapshot) => {
      const data = snapshot.val();
      if (data) {
        estadoNumeros = Array.from({ length: totalPaginas * numerosPorPagina }, () => false);
        Object.entries(data).forEach(([index, valor]) => {
          estadoNumeros[parseInt(index)] = valor;
        });
        atualizarInterface();
      }
    });

    window.mostrarPagina = mostrarPagina;

    window.gerarImagem = () => {
      const alvo = document.body;
      html2canvas(alvo, {
        useCORS: true,
        scrollX: 0,
        scrollY: 0,
        width: document.body.scrollWidth,
        height: document.body.scrollHeight,
        windowWidth: document.body.scrollWidth,
        windowHeight: document.body.scrollHeight
      }).then(canvas => {
        const imagem = canvas.toDataURL("image/png");
        const link = document.createElement('a');
        link.href = imagem;
        link.download = `rifa_pagina_${paginaAtual}.png`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      });
    };

    window.comprarSelecionados = () => {
      const alvo = document.createElement('div');
      alvo.style.padding = '20px';
      alvo.style.fontFamily = 'Arial';
      alvo.innerHTML = `
        <h2>Comprovante de Compra</h2>
        <p><strong>Números comprados:</strong> ${selecionados.join(', ')}</p>
        <p><strong>Data:</strong> ${new Date().toLocaleString()}</p>
      `;

      document.body.appendChild(alvo);

      html2canvas(alvo).then(canvas => {
        const imagem = canvas.toDataURL("image/png");
        const link = document.createElement('a');
        link.href = imagem;
        link.download = `comprovante_rifa.png`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        document.body.removeChild(alvo);

        // Marcar no banco de dados
        selecionados.forEach(num => {
          const indexGlobal = num - 1;
          set(ref(db, 'rifas/' + indexGlobal), true);
        });

        selecionados = [];
        botaoComprar.style.display = 'none';
      });
    };

    mostrarPagina(1);
  </script>
</head>

<body>
  <div class="topo" id="topo">
    <h2>🎟️ Rifa Solidária - R$ 5,00 - Sorteio na Loteria Federal</h2>
    <h2>💸 PIX: 04731629039 </h2>
    <h3>Esta rifa foi criada com o objetivo de ajudar a ....(nome) ❤️</h3>

    <div class="secao-premios">
      <div class="premio-card">
        <p><strong>1º Prêmio</strong></p>
        <span>Fogão CookTop</span>
        <img src="img/fogao.jpg" alt="Fogão" class="img-rifa">
      </div>

      <div class="premio-card">
        <p><strong>2º Prêmio</strong></p>
        <span>Batedeira</span>
        <img src="img/batedeira.jpg" alt="Batedeira" class="img-rifa">
      </div>

      <div class="premio-card">
        <p><strong>3º Prêmio</strong></p>
        <span>Liquidificador</span>
        <img src="img/liquidificador.jpg" alt="Liquidificador" class="img-rifa">
      </div>
    </div>

    <p style="margin-top: 20px;"><strong>Sorteio:</strong> 16/05/2026</p>
  </div>

  <div class="botoes-pagina">
    <button onclick="mostrarPagina(1)">Página 1</button>
    <button onclick="mostrarPagina(2)">Página 2</button>
    <button onclick="mostrarPagina(3)">Página 3</button>
    <button onclick="mostrarPagina(4)">Página 4</button>
    <button onclick="mostrarPagina(5)">Página 5</button>
  </div>

  <div class="tabela-rifas" id="rifaContainer"></div>

  <button id="botaoComprar" onclick="comprarSelecionados()">🛒 Comprar Números Selecionados</button>
  <button onclick="gerarImagem()">🖼️ Gerar Imagem da Página Atual</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>

</html>
